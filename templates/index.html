<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ourbox 오산센터 재고조사</title>

<style>
body { font-family:sans-serif; padding:20px; background:#f0f9f4; }

.header {
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#2e7d32;
}

.card {
    background:white;
    padding:25px;
    border-radius:15px;
}

p { font-size:20px; }

button {
    width:100%;
    padding:18px;
    font-size:20px;
    margin-top:10px;
    background:#66bb6a;
    color:white;
    border:none;
}

input {
    width:100%;
    padding:18px;
    font-size:22px;
    margin-top:10px;
}

.nav-buttons {
    display:flex;
    gap:8px;
}
.nav-buttons button { flex:1; }

/* 🔥 로딩 UI */
#loading {
    display:none;
    text-align:center;
    font-size:22px;
    padding:30px;
    color:#2e7d32;
}
</style>
</head>

<body>

<div class="header">ourbox 오산센터 재고조사</div>

<!-- 🔥 로딩 -->
<div id="loading">⏳ 엑셀 처리중입니다...</div>

<form id="uploadForm"
      action="/upload"
      method="post"
      enctype="multipart/form-data"
      onsubmit="showLoading()">

    <input type="file" name="file" accept=".xlsx,.xls,.csv">
    <button type="submit">업로드 시작</button>
</form>

<div id="app"></div>

<script>
let data = {{ data|tojson }};
let currentIndex = 0;

window.onload = function() {

    if (data && data.length > 0) {

        document.getElementById('uploadForm').style.display = 'none';

        data = data.map(x => ({
            ...x,
            "실수량": "",
            "차이수량": ""
        }));

        initProductList();
        render();
    }
};

/* 🔥 로딩 표시 */
function showLoading(){
    document.getElementById('loading').style.display = 'block';
}
</script>

<script src="/static/script.js"></script>

</body>
</html>
