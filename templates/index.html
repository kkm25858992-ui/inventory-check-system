<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ourbox 오산센터 재고조사</title>

<style>
body {
    font-family:sans-serif;
    padding:20px;
    background:#f0f9f4;
}

/* 제목 */
.header {
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#2e7d32;
    margin-bottom:20px;
}

/* 카드 */
.card {
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* 텍스트 */
p {
    font-size:20px;
    margin:8px 0;
}

/* 버튼 */
button {
    width:100%;
    padding:18px;
    margin-top:10px;
    font-size:20px;
    background:#66bb6a;
    color:white;
    border:none;
    border-radius:12px;
}

/* 입력 */
input {
    width:100%;
    padding:18px;
    font-size:22px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* 하단 버튼 */
.nav-buttons {
    display:flex;
    gap:8px;
    margin-top:10px;
}

.nav-buttons button {
    flex:1;
    font-size:18px;
}

/* 업로드 영역 */
#uploadForm {
    background:white;
    padding:25px;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="header">ourbox 오산센터 재고조사</div>

<form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept=".xlsx,.xls,.csv">
    <button type="submit">업로드 시작</button>
</form>

<div id="app"></div>

<script>
let data = {{ data|tojson }};
let currentIndex = 0;
</script>

<script src="/static/script.js"></script>

<script>
window.onload = function() {
    if (data && data.length > 0) {
        document.getElementById('uploadForm').style.display = 'none';

        data = data.map(x => ({
            ...x,
            "실수량": "",
            "차이수량": ""
        }));

        render();
    }
};
</script>

</body>
</html>
