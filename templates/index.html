<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ourbox 오산센터 재고조사</title>

<style>
body { font-family:sans-serif; padding:15px; background:#f0f9f4; }
.header { text-align:center; font-size:22px; color:#2e7d32; }

.upload-box {
    background:white;
    padding:25px;
    border-radius:10px;
}

button {
    width:100%;
    padding:15px;
    margin-top:10px;
    background:#66bb6a;
    color:white;
    border:none;
    border-radius:8px;
}

.nav-buttons { display:flex; gap:5px; }
.nav-buttons button { flex:1; }
</style>
</head>

<body>

<div class="header">ourbox 오산센터 재고조사</div>

<div class="upload-box" id="uploadBox">
    <input type="file" id="fileInput"
        accept=".xlsx,.xls,.csv,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet">
    <button onclick="upload()">업로드 시작</button>
</div>

<div id="app"></div>

<script src="/static/script.js"></script>

</body>
</html>
