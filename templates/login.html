<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인</title>

<style>
body {
    font-family:sans-serif;
    background:#f0f9f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:350px;
}

h2 {
    text-align:center;
    color:#2e7d32;
}

input {
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:16px;
}

button {
    width:100%;
    padding:15px;
    margin-top:15px;
    background:#66bb6a;
    color:white;
    border:none;
    font-size:16px;
}
</style>
</head>

<body>

<form class="box" method="post">
    <h2>로그인</h2>

    <input name="id" placeholder="아이디">
    <input name="pw" type="password" placeholder="비밀번호">

    <button type="submit">로그인</button>
</form>

</body>
</html>
